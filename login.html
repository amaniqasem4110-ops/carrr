
 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login- TURPOTIC</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ══════════════════════════════════════
     PAGE 6 – SIGN UP / LOGIN
══════════════════════════════════════ -->
<div id="p6" class="page active">
  <div class="auth-wrap">
    <div class="auth-box">
      <div class="auth-logo"><span>TURPO</span>TIC</div>
      <h2 class="auth-title">Welcome Back</h2>
      <form onsubmit="return false">
        <input type="email" class="auth-field" placeholder="Email Address">
        <input type="password" class="auth-field" placeholder="Password">
        <span class="auth-forgot">Forgot Password?</span>
        <button class="btn-auth btn-auth-primary">Sign In</button>
        <div class="auth-divider">or</div>
        <button class="btn-auth btn-auth-outline" onclick="window.location.href='signup.html'">Create Account</button>
      </form>
      <div class="auth-switch">Access app platform? <a href="luminous.html">Launch App</a></div>
    </div>
  </div>
</div>

</body>
</html>
