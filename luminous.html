
 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luminous Learning-App</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ══════════════════════════════════════
     LUMINOUS LEARNING (MOBILE APP)
══════════════════════════════════════ -->
<div id="p7" class="page active">
  <div class="ll-wrap">
    <div class="ll-phone">
      <div class="ll-header">
        <div class="ll-brand">
          <div class="ll-avatar">T</div>
          <span class="ll-name">TURPOTIC app</span>
        </div>
        <span class="ll-mic">🎙️</span>
      </div>

      <div class="ll-tabs">
        <div class="ll-tab active">Leaderboard</div>
        <div class="ll-tab">Lessons</div>
      </div>

      <div class="ll-podium">
        <div class="pod-item pod-2">
          <img class="pod-avatar" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100&q=80" alt="User">
          <div class="pod-rank">2</div>
          <div class="pod-name">Sarah.M</div>
          <div class="pod-xp">1,420 XP</div>
        </div>
        <div class="pod-item pod-1">
          <div class="pod-crown">👑</div>
          <img class="pod-avatar" src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100&q=80" alt="User">
          <div class="pod-rank">1</div>
          <div class="pod-name">Alex_Ri</div>
          <div class="pod-xp">1,850 XP</div>
        </div>
        <div class="pod-item pod-3">
          <img class="pod-avatar" src="https://images.unsplash.com/photo-1501196354995-cbb51c65aaea?w=100&q=80" alt="User">
          <div class="pod-rank">3</div>
          <div class="pod-name">David.K</div>
          <div class="pod-xp">1,290 XP</div>
        </div>
      </div>

      <div class="ll-list">
        <div class="ll-row">
          <span class="ll-rank-num">4</span>
          <div class="ll-row-avatar"></div>
          <div class="ll-row-info">
            <div class="ll-row-name">Emma Watson</div>
            <div class="ll-row-streak">🔥 12 day streak</div>
          </div>
          <span class="ll-row-xp">1,120 XP</span>
        </div>
      </div>

      <div class="ll-myrank">
        <div class="ll-myrank-avatar">🏆</div>
        <div class="ll-myrank-info">
          <div class="ll-myrank-label">Your Standing</div>
          <div class="ll-myrank-rank">Rank #14</div>
          <div class="ll-myrank-sub">Top 5% of this week</div>
        </div>
        <div class="ll-myrank-right">
          <div class="ll-myrank-xp">840 XP</div>
          <div class="ll-myrank-today">+45 Today</div>
        </div>
        <span class="ll-arrow">›</span>
      </div>

      <div class="ll-achievements">
        <div class="ll-ach-header">
          <span class="ll-ach-title">Recent Achievements</span>
          <span class="ll-ach-view">View all</span>
        </div>
        <div class="ll-ach-row">
          <div class="ll-ach-card">
            <div class="ll-ach-icon">⚡</div>
            <div class="ll-ach-name">Overdrive</div>
            <span class="ll-ach-when">Yesterday</span>
          </div>
          <div class="ll-ach-card">
            <div class="ll-ach-icon">💎</div>
            <div class="ll-ach-name">Precision</div>
            <span class="ll-ach-when">3 days ago</span>
          </div>
        </div>
      </div>

      <div class="ll-bottom-nav">
        <div class="ll-nav-item active">
          <div class="ll-nav-icon-wrap"><span class="ll-nav-icon">🏆</span></div>
          <span class="ll-nav-label">Rank</span>
        </div>
        <div class="ll-nav-item" onclick="window.location.href='index.html'">
          <div class="ll-nav-icon-wrap"><span class="ll-nav-icon">🏠</span></div>
          <span class="ll-nav-label">Exit</span>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
