 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up-TURPOTIC</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="p6-signup" class="page active">
  <div class="auth-wrap">
    <div class="auth-box">
      <div class="auth-logo"><span>TURPO</span>TIC</div>
      <h2 class="auth-title">Create Account</h2>
      <form onsubmit="return false">
        <input type="text" class="auth-field" placeholder="Full Name">
        <input type="email" class="auth-field" placeholder="Email Address">
        <input type="password" class="auth-field" placeholder="Password">
        <button class="btn-auth btn-auth-primary">Register</button>
        <div class="auth-divider">or</div>
        <button class="btn-auth btn-auth-outline" onclick="window.location.href='login.html'">Sign In Instead</button>
      </form>
    </div>
  </div>
</div>

</body>
</html>
